spring:
  application:
    name: game-master-agent
  ai:
    model:
      embedding: minimax
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE

gamemaster:
  rag:
    enabled: true
    knowledge-base-path: knowledge_base
    top-k: 4
    similarity-threshold: 0.6
    chunk-size: 800
    min-chunk-size-chars: 350
    min-chunk-length-to-embed: 10
    max-num-chunks: 10000
